<html>
    <head><title>Table using function</title></head>

    <body>
        <script>
            var num=5;
            function printTable(n)
        {
                for (var i=1;i<=10;i++)
            {
                console.log(n+" x "+i+" = "+(n*i));
            }
        }
        printTable(num);
        </script>
        </body>
</html>
