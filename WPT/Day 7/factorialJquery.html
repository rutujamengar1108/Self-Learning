<!DOCTYPE html>
<html>
<head>
<title>Factorial using jQuery</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

    $("#num").change(function(){

        let n = $("#num").val();
        let fact = 1;

        for(let i = 1; i <= n; i++){
            fact = fact * i;
        }

        $("#result").text("Factorial = " + fact);

    });

});
</script>

</head>

<body>

<h3>Enter a Number:</h3>
<input type="text" id="num">

<p id="result"></p>

</body>
</html>
