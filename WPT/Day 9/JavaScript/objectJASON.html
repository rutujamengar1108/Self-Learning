<!DOCTYPE html>
<html>
<head>
<title>Object to JSON</title>
</head>

<body>

<p id="result"></p>

<script>

// Object data
let student = {
    id: 101,
    name: "Rutuja",
    grade: "A"
};

// Convert Object to JSON
let jsonData = JSON.stringify(student);

// Convert JSON back to Object
let objData = JSON.parse(jsonData);

// Display data
document.getElementById("result").innerHTML =
"JSON Format: " + jsonData + "<br><br>" +
"Object Format: " + objData.id + " " + objData.name + " " + objData.grade;

</script>

</body>
</html>
